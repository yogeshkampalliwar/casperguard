name: Deploy to Casper Testnet

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install wasm target, casper-client and cargo-odra
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install casper-client
          cargo install cargo-odra

      - name: Install wasm32 target for pinned nightly toolchain
        run: |
          cd contract
          TOOLCHAIN=$(cat rust-toolchain 2>/dev/null | tr -d ' \n' || echo nightly)
          echo "Using toolchain: $TOOLCHAIN"
          rustup toolchain install "$TOOLCHAIN"
          rustup target add wasm32-unknown-unknown --toolchain "$TOOLCHAIN"

      - name: Install wasm-opt (binaryen) - latest release
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz -o binaryen.tar.gz
          tar -xzf binaryen.tar.gz
          sudo cp binaryen-version_119/bin/wasm-opt /usr/local/bin/
          wasm-opt --version

      - name: Write secret key
        run: echo "${{ secrets.CASPER_SECRET_KEY }}" > secret_key.pem

      - name: Build contract
        run: |
          cd contract
          cargo odra build

      - name: Deploy to testnet
        run: |
          casper-client put-deploy \
            --node-address https://node.testnet.casper.network/rpc \
            --chain-name casper-test \
            --secret-key secret_key.pem \
            --payment-amount 100000000000 \
            --session-path contract/wasm/CasperGuard.wasm

      - name: Cleanup
        if: always()
        run: rm -f secret_key.pem
